<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Little Mandarin Club | 快乐学中文</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Main Application Container -->
        <header id="header">
            <div class="logo">🐼 Little Mandarin Club</div>
            <div class="stats">
                <span class="star-icon">⭐</span>
                <span id="star-count">0</span>
            </div>
        </header>

        <main id="main-content">
            <!-- Dynamic Content Injected Here -->
            <div id="home-view" class="view">
                <h1>Hi! Ready to learn?</h1>
                <div class="category-grid" id="category-grid"></div>
            </div>

            <div id="lesson-view" class="view hidden">
                <button class="back-btn" id="back-to-home">← Back</button>
                <div id="card-container"></div>
                <div class="controls">
                    <button class="nav-btn" id="prev-word">Prev</button>
                    <button class="quiz-btn" id="start-quiz">Quiz Time!</button>
                    <button class="nav-btn" id="next-word">Next</button>
                </div>
            </div>

            <div id="quiz-view" class="view hidden">
                <button class="back-btn" id="quiz-home-btn">🏠 Home</button>
                <div class="progress-bar-container">
                    <div id="quiz-progress" class="progress-bar"></div>
                </div>
                <h2 id="quiz-question-text">Click the sound!</h2>
                <div class="quiz-options" id="quiz-options"></div>
            </div>

            <div id="congrats-view" class="view hidden">
                <div class="congrats-card">
                    <h2>Fantastic! 🎉</h2>
                    <p>You earned a star!</p>
                    <div class="big-star">⭐</div>
                    <button class="primary-btn" id="finish-congrats">Back to Categories</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Data and App Logic -->
    <script src="vocabulary.js"></script>
    <script src="app.js"></script>
</body>
</html>
